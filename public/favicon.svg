<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4c1d95" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background fill -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle top-left shine -->
  <ellipse cx="160" cy="130" rx="260" ry="180" fill="url(#shine)"/>

  <!-- White circle backdrop for checkmark -->
  <circle cx="256" cy="232" r="158" fill="white" opacity="0.97" filter="url(#shadow)"/>

  <!-- Purple bold checkmark -->
  <path d="M158 238 L228 316 L366 162"
        fill="none" stroke="#7c3aed" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Streak indicator pill at bottom -->
  <rect x="136" y="424" width="240" height="52" rx="26" fill="rgba(255,255,255,0.22)"/>
  <!-- 5 streak dots: 3 filled, 1 half, 1 empty -->
  <circle cx="184" cy="450" r="13" fill="white"/>
  <circle cx="224" cy="450" r="13" fill="white"/>
  <circle cx="264" cy="450" r="13" fill="white"/>
  <circle cx="304" cy="450" r="13" fill="rgba(255,255,255,0.5)"/>
  <circle cx="344" cy="450" r="13" fill="rgba(255,255,255,0.2)"/>
</svg>
